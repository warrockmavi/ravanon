<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/ravanon.ico" type="image/x-icon">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <title>Watsons Haziran 2026 Kataloğu — RAVANON</title>
  <script src="js/tailwind-theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/custom.css">
  <link rel="stylesheet" href="css/luxury.css">
  <link rel="stylesheet" href="css/theme-sephora.css">
  <style>
    #catalog-page-img { max-width: 100%; height: auto; transition: opacity .25s, transform .2s; transform-origin: top center; box-shadow: 0 20px 60px rgba(0,0,0,.4); border-radius: 4px; display: block; }
    #view-pages { min-height: 50vh; display: flex; flex-direction: column; align-items: center; width: 100%; }
    #view-pages.hidden { display: none !important; }
    #page-loading { animation: pulse 1.2s ease-in-out infinite; }
    #pdf-embed { min-height: 80vh; }
  </style>
</head>
<body class="theme-sephora bg-white text-cream">
  <div id="site-header"></div>

  <main class="pt-32 pb-16 min-h-screen bg-gradient-to-b from-[#0a1628] to-navy">
    <div class="max-w-5xl mx-auto px-4">
      <div class="text-center mb-8">
        <span class="inline-block px-4 py-1 rounded-full bg-[#00A651]/20 text-[#4ade80] text-xs font-semibold uppercase tracking-widest mb-4">Watsons · Haziran 2026</span>
        <h1 class="font-display text-4xl md:text-5xl font-light mb-3">Insert Kataloğu</h1>
        <p class="text-cream/50">51 sayfa · Kaydır veya ok tuşları ile gezin</p>
      </div>

      <div id="catalog-toolbar" class="sticky top-28 z-20 flex flex-wrap items-center justify-center gap-3 p-4 mb-6 rounded-2xl border border-gold/20 bg-navy-light/95 backdrop-blur-md">
        <button id="btn-mode-pages" type="button" class="px-4 py-2 rounded-xl text-sm font-medium bg-gold text-navy">Sayfa Görünümü</button>
        <button id="btn-mode-native" type="button" class="px-4 py-2 rounded-xl text-sm font-medium text-cream/70 border border-gold/20">PDF Görünümü</button>
        <div class="flex items-center gap-2">
          <button id="btn-prev" type="button" class="w-10 h-10 rounded-xl border border-gold/30 text-gold text-xl hover:bg-gold/10" aria-label="Önceki">‹</button>
          <span class="text-sm text-cream/80 min-w-[90px] text-center font-medium">
            <span id="page-current">1</span> / <span id="page-total">51</span>
          </span>
          <button id="btn-next" type="button" class="w-10 h-10 rounded-xl border border-gold/30 text-gold text-xl hover:bg-gold/10" aria-label="Sonraki">›</button>
        </div>
        <input type="range" id="page-slider" min="1" max="51" value="1" class="w-32 sm:w-48 accent-gold" aria-label="Sayfa">
        <button id="btn-zoom-out" type="button" class="px-2 py-1 rounded-lg border border-gold/20 text-sm">−</button>
        <span id="zoom-label" class="text-xs text-cream/50 w-10 text-center">100%</span>
        <button id="btn-zoom-in" type="button" class="px-2 py-1 rounded-lg border border-gold/20 text-sm">+</button>
        <a href="assets/catalogs/watsons-haziran-2026.pdf" target="_blank" class="px-4 py-2 border border-gold/30 text-gold text-sm rounded-xl hover:bg-gold/10">PDF Aç</a>
        <a href="assets/catalogs/watsons-haziran-2026.pdf" download class="px-4 py-2 bg-gold text-navy text-sm font-semibold rounded-xl">İndir</a>
      </div>

      <div id="pdf-loading" class="text-center py-24 text-cream/40">
        <p id="pdf-progress" class="text-lg">Katalog hazırlanıyor…</p>
        <p class="text-xs mt-2 text-cream/30">İlk açılışta birkaç saniye sürebilir</p>
      </div>

      <div id="pdf-error" class="hidden text-center py-16 px-4 rounded-2xl border border-red-500/30 bg-red-900/10 mb-6">
        <p class="text-red-400 mb-2" id="pdf-error-msg">Katalog yüklenemedi</p>
        <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-gold text-navy rounded-xl text-sm font-semibold">Yenile</button>
      </div>

      <!-- Ana görünüm: önceden render edilmiş sayfa görselleri -->
      <div id="view-pages" class="hidden flex-col items-center justify-start overflow-auto pb-8 w-full">
        <p id="page-loading" class="text-cream/40 text-sm mb-4 hidden">Sayfa yükleniyor…</p>
        <img id="catalog-page-img" alt="Katalog sayfası" class="select-none max-w-full h-auto w-full sm:w-auto" draggable="false" width="1200">
        <p class="text-xs text-cream/30 mt-4">← → ok tuşları veya kaydırma ile sayfa değiştirin</p>
      </div>

      <!-- Yedek: tarayıcı PDF (bazı ortamlarda çalışmayabilir) -->
      <div id="view-native" class="hidden rounded-2xl border border-gold/20 overflow-hidden bg-navy">
        <embed id="pdf-embed" type="application/pdf" class="w-full" style="height:85vh" />
      </div>

      <div id="view-book" class="hidden flex justify-center overflow-auto pb-8">
        <canvas id="pdf-canvas"></canvas>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/ai-chat.js"></script>
  <script src="js/skin-quiz.js"></script>
  <script src="js/luxury-features.js"></script>
  <script src="js/components.js"></script>
  <script src="js/catalog-viewer.js"></script>
</body>
</html>
